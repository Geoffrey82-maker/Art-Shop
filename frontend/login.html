<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <title>Log In - ArtMo</title>
</head>

<body>
    <div class="loader" id="loader">
        <div class="loader-logo">ArtMo</div>
        <div class="loader-bar">
            <div class="loader-fill" id="loaderFill"></div>
        </div>
        <div class="loader-text" id="loaderText">Curating experience...</div>
    </div>
    <div class="toast-notification" id="toastContainer"></div>
    <header id="nav">
        <div class="nav-container">
            <div class="logo"><a class="navlink" href="index.html">ArtMo</a></div>
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a class="navlink" href="index.html#home">Home</a></li>
                    <li><a class="navlink" href="index.html#gallery">Gallery</a></li>
                    <li><a class="navlink" href="index.html#services">Services</a></li>
                    <li><a class="navlink" href="index.html#about">About</a></li>
                </ul>
            </nav>
        </div>
        <div class="icon-btn nav-actions">
            <button class="nav-btn" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </button>
        </div>
    </header>

    <main>
        <section class="signup-section">
            <div class="signup-container">
                <div class="signup-header">
                    <h1>Welcome Back</h1>
                    <p>Log in to your ArtMo account to continue curating.</p>
                </div>
                <form class="signup-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="social-login">
                        <div class="divider">
                            <span>or</span>
                        </div>
                        <div class="social-buttons">
                            <button type="button" class="social-btn google"
                                onclick="alert('Google login not implemented yet')">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                    <path
                                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                    <path
                                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                    <path
                                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                                </svg>
                                Continue with Google
                            </button>
                            <button type="button" class="social-btn facebook"
                                onclick="alert('Facebook login not implemented yet')">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                                </svg>
                                Continue with Facebook
                            </button>
                            <button type="button" class="social-btn linkedin"
                                onclick="alert('LinkedIn login not implemented yet')">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                                </svg>
                                Continue with LinkedIn
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary full-width">Log In</button>
                </form>
                <div class="signup-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>

</html>
